{% extends "admin/base_site.html" %}

{% block content %}
<h1>Bulk Add Marks</h1>

<form method="post">
    {% csrf_token %}

    <div style="margin-bottom: 15px;">
        <label><strong>Standard:</strong></label>
        <select name="standard" onchange="this.form.submit()">
            <option value="">Select Standard</option>
            {% for std in standards %}
                <option value="{{ std.id }}" {% if selected_standard == std.id|stringformat:"s" %}selected{% endif %}>
                    {{ std.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div style="margin-bottom: 15px;">
        <label><strong>Exam:</strong></label>
       <select name="exam">
    <option value="">Select Exam</option>
    {% for exam in exams %}
        <option value="{{ exam.id }}" {% if selected_exam == exam.id|stringformat:"s" %}selected{% endif %}>
            {{ exam.name }} - {{ exam.date }}
        </option>
    {% endfor %}
    </select>
    </div>

    <div style="margin-bottom: 15px;">
        <label><strong>Subject:</strong></label>
        <input type="text" name="subject" value="{{ subject }}" />
    </div>

    {% if students %}
        <table border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse; width: 100%;">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                    <tr>
                        <td>{{ student.name }}</td>
                        <td>
                            <input type="number" name="marks_{{ student.id }}" min="0" />
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <br>
        <button type="submit" name="save_bulk" class="default">Save Bulk Marks</button>
    {% endif %}
</form>
{% endblock %}
